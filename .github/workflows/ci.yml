name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (x86_64)
    runs-on: ubuntu-latest  # x86_64; AVX2/BMI2/LZCNT required by sprintz
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
